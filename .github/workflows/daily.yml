name: Bulletin météo quotidien

on:
  schedule:
    # Filet de sécurité (trigger principal = cron Proxmox CT103 6h Paris via gh workflow run).
    # GH Actions ignore le DST → les 3 lignes tournent toute l'année. Le garde-fou
    # horaire dans main.py (Paris ∈ {5,6}) filtre les firings hors créneau, et la
    # dédup via data/YYYY-MM-DD.json garantit un envoi unique.
    # Objectif : alerte reçue ≤ 7h Paris malgré les retards fréquents de GH Actions.
    - cron: "0 3 * * *"   # CEST (été) : 5h Paris ✓ | CET (hiver) : 4h Paris ✗ rejeté
    - cron: "0 4 * * *"   # CEST (été) : 6h Paris ✓ | CET (hiver) : 5h Paris ✓
    - cron: "0 5 * * *"   # CEST (été) : 7h Paris ✗ rejeté | CET (hiver) : 6h Paris ✓
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meteo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bulletin
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Déclenchement manuel → bypass garde horaire/dédup
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python main.py

      - name: Commit données du jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: météo $(date -u +%Y-%m-%d)"
          git push
