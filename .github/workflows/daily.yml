name: Bulletin météo quotidien

on:
  schedule:
    # Triple tentative espacée de 30 min (été CEST): 6h00, 6h30, 7h00 Paris.
    # En hiver (CET) ça glisse à 5h00, 5h30, 6h00 Paris.
    - cron: "0 4 * * *"
    - cron: "30 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meteo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bulletin
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Déclenchement manuel → bypass garde horaire/dédup
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python main.py

      - name: Commit données du jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: météo $(date -u +%Y-%m-%d)"
          git push
