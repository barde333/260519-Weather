name: Bulletin météo quotidien

on:
  schedule:
    # Double cron UTC pour couvrir heure d'hiver (6h UTC) et heure d'été (5h UTC)
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meteo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bulletin
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit données du jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: météo $(date -u +%Y-%m-%d)"
          git push
