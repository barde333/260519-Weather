name: Bulletin météo quotidien

on:
  schedule:
    # Filet de sécurité (trigger principal = cron Proxmox CT103 6h Paris via gh workflow run).
    # Cible : 6h30 Paris toute l'année, 30 min après le cron Proxmox.
    # Dédup via data/YYYY-MM-DD.json → no-op si le cron 6h a déjà envoyé.
    - cron: "30 4 * * *"   # CEST (été) : 4h30 UTC = 6h30 Paris
    - cron: "30 5 * * *"   # CET  (hiver) : 5h30 UTC = 6h30 Paris
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meteo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bulletin
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Déclenchement manuel → bypass garde horaire/dédup
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python main.py

      - name: Commit données du jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: météo $(date -u +%Y-%m-%d)"
          git push
